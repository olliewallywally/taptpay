<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0055FF" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TaptPay" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />
    
    <!-- Default SEO Meta Tags (overridden by page-specific tags) -->
    <title>TapTpay - Modern Payment Terminal | QR & NFC Payments</title>
    <meta name="description" content="Accept payments anywhere with TapTpay. Simple QR code and NFC payment terminal for modern businesses. Fast, secure, and easy to use." />
    <meta name="keywords" content="payment terminal, QR payments, NFC payments, mobile payments, contactless payments, business payments" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TapTpay - Modern Payment Terminal" />
    <meta property="og:description" content="Revolutionary payment solution with QR codes and NFC. Accept payments instantly with no hardware required." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="TapTpay" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TapTpay - Modern Payment Terminal" />
    <meta name="twitter:description" content="Revolutionary payment solution with QR codes and NFC." />
    <meta name="twitter:image" content="/og-image.png" />
    
    <!-- Additional SEO -->
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="author" content="TapTpay" />
    
    <!-- Structured Data (JSON-LD) for Rich Results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "TapTpay",
      "description": "Modern payment terminal with QR code and NFC payment capabilities for businesses",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "NZD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "127"
      },
      "featureList": [
        "QR Code Payments",
        "NFC Payments",
        "Real-time Transaction Tracking",
        "Multi-currency Support",
        "Instant Notifications",
        "Secure Encryption"
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TapTpay",
      "url": "https://taptpay.com",
      "logo": "https://taptpay.com/logo.png",
      "description": "Modern payment terminal solution for businesses in New Zealand",
      "sameAs": [
        "https://twitter.com/taptpay",
        "https://facebook.com/taptpay",
        "https://linkedin.com/company/taptpay"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "email": "support@taptpay.com"
      }
    }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
