    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is the cheapest EFTPOS system in New Zealand?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "TaptPay is New Zealand's lowest-cost EFTPOS alternative. Unlike traditional EFTPOS machines that charge monthly rental fees plus per-transaction costs, TaptPay is a 100% digital POS system with no hardware to buy or rent and no lock-in contracts. You only pay a small per-transaction fee."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need an EFTPOS machine for my NZ business?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. TaptPay replaces the traditional EFTPOS machine with a digital POS system. Customers pay by scanning a QR code or tapping their phone via NFC — no card reader or EFTPOS terminal required. It works on any smartphone or tablet."
          }
        },
        {
          "@type": "Question",
          "name": "How does a digital POS system work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A digital POS system like TaptPay works entirely through your phone or tablet. You create a transaction, and the customer pays by scanning a QR code or tapping their phone. Payments are processed securely through Windcave and settled directly to your NZ bank account."
          }
        },
        {
          "@type": "Question",
          "name": "What POS system do most NZ businesses use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Many NZ businesses are moving away from traditional EFTPOS terminals to cloud-based POS systems. TaptPay is designed specifically for New Zealand businesses — it's 100% Kiwi owned, supports NZD settlements, and works with all major payment methods including Apple Pay and Google Pay."
          }
        },
        {
          "@type": "Question",
          "name": "How much does a POS system cost in NZ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Traditional POS systems in NZ typically cost $30–$100 per month in hardware rental plus per-transaction fees. TaptPay has no monthly fees, no hardware costs, and no lock-in contracts — making it one of the most affordable POS solutions available in New Zealand."
          }
        },
        {
          "@type": "Question",
          "name": "Can TaptPay accept contactless payments in New Zealand?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. TaptPay supports all major contactless payment methods in New Zealand including Apple Pay, Google Pay, Visa payWave, and Mastercard contactless — all through QR codes and NFC, with no EFTPOS terminal needed."
          }
        },
        {
          "@type": "Question",
          "name": "Is TaptPay suitable for small businesses in NZ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. TaptPay was built specifically for NZ small businesses — cafes, market stalls, food trucks, tradies, and service businesses. There's no upfront cost, no monthly fees, and you can be set up and accepting payments in under 5 minutes."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between EFTPOS and a POS system?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "EFTPOS (Electronic Funds Transfer at Point of Sale) is a payment method specific to NZ and Australia, typically requiring a physical card terminal. A POS system is broader — it handles transactions, tracking, and business management. TaptPay combines both: it's a full POS system that accepts EFTPOS-style payments digitally, without needing a physical terminal."
          }
        }
      ]
    }
