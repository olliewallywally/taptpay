<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 148 105">
  <defs>
    <style id="font-style"></style>
  </defs>
  <!-- Primary colour background -->
  <rect id="color-primary" x="0" y="0" width="148" height="105" fill="#0055FF"/>
  <!-- Inner white panel -->
  <rect x="5" y="5" width="138" height="95" rx="4" fill="white"/>
  <!-- Accent bar left -->
  <rect x="5" y="5" width="5" height="95" rx="3" fill="#00E5CC" id="color-accent"/>
  <!-- Logo area -->
  <image id="logo-placeholder" x="16" y="10" width="30" height="12" href="" preserveAspectRatio="xMidYMid meet"/>
  <!-- Separator -->
  <line x1="16" y1="26" x2="83" y2="26" stroke="#e5e7eb" stroke-width="0.3"/>
  <!-- Business name -->
  <text id="text-business-name" x="16" y="36" font-family="sans-serif" font-size="5.5" font-weight="700" fill="#0055FF">Your Business</text>
  <!-- Tagline -->
  <text id="text-tagline" x="16" y="45" font-family="sans-serif" font-size="3" fill="#6b7280">Tagline or location</text>
  <!-- Instructions -->
  <text id="text-instructions" x="16" y="62" font-family="sans-serif" font-size="4" font-weight="600" fill="#111827">Scan to Pay</text>
  <text x="16" y="70" font-family="sans-serif" font-size="3" fill="#6b7280">Point camera at QR code</text>
  <!-- Footer -->
  <text id="text-footer" x="16" y="91" font-family="sans-serif" font-size="2.5" fill="#9ca3af">Powered by TaptPay</text>
  <!-- Divider -->
  <line x1="88" y1="10" x2="88" y2="95" stroke="#e5e7eb" stroke-width="0.3"/>
  <!-- QR label -->
  <text x="116" y="17" text-anchor="middle" font-family="sans-serif" font-size="2.8" fill="#9ca3af">scan to pay</text>
  <!-- QR white background -->
  <rect x="91" y="19" width="49" height="49" rx="3" fill="#f9fafb" stroke="#e5e7eb" stroke-width="0.3"/>
  <!-- QR code image -->
  <image id="qr-placeholder" x="94" y="22" width="43" height="43" href="" preserveAspectRatio="xMidYMid meet"/>
  <!-- QR sub-label -->
  <text x="116" y="73" text-anchor="middle" font-family="sans-serif" font-size="2.5" fill="#9ca3af">scan with phone camera</text>
</svg>
