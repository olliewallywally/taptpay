<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 105 148">
  <defs>
    <style id="font-style"></style>
  </defs>
  <!-- Primary colour background -->
  <rect id="color-primary" x="0" y="0" width="105" height="148" fill="#0055FF"/>
  <!-- Inner white panel -->
  <rect x="5" y="5" width="95" height="138" rx="4" fill="white"/>
  <!-- Accent bar top -->
  <rect x="5" y="5" width="95" height="5" rx="3" fill="#00E5CC" id="color-accent"/>
  <!-- Logo area -->
  <image id="logo-placeholder" x="37.5" y="14" width="30" height="12" href="" preserveAspectRatio="xMidYMid meet"/>
  <!-- Separator -->
  <line x1="20" y1="30" x2="85" y2="30" stroke="#e5e7eb" stroke-width="0.3"/>
  <!-- Business name -->
  <text id="text-business-name" x="52.5" y="39" text-anchor="middle" font-family="sans-serif" font-size="5.5" font-weight="700" fill="#0055FF">Your Business</text>
  <!-- Tagline -->
  <text id="text-tagline" x="52.5" y="47" text-anchor="middle" font-family="sans-serif" font-size="3.2" fill="#6b7280">Tagline here</text>
  <!-- QR white background -->
  <rect x="22.5" y="51" width="60" height="60" rx="3" fill="#f9fafb" stroke="#e5e7eb" stroke-width="0.3"/>
  <!-- QR code -->
  <image id="qr-placeholder" x="25.5" y="54" width="54" height="54" href="" preserveAspectRatio="xMidYMid meet"/>
  <!-- QR label -->
  <text x="52.5" y="119" text-anchor="middle" font-family="sans-serif" font-size="2.8" fill="#9ca3af">scan with phone camera</text>
  <!-- Separator -->
  <line x1="20" y1="124" x2="85" y2="124" stroke="#e5e7eb" stroke-width="0.3"/>
  <!-- Instructions -->
  <text id="text-instructions" x="52.5" y="132" text-anchor="middle" font-family="sans-serif" font-size="4" font-weight="600" fill="#111827">Scan to Pay</text>
  <!-- Footer -->
  <text id="text-footer" x="52.5" y="141" text-anchor="middle" font-family="sans-serif" font-size="2.5" fill="#9ca3af">Powered by TaptPay</text>
</svg>
