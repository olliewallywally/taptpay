<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaptPay – Payment Page Design Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 40px;
    }

    .preview-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #0a0a1a;
      color: #fff;
      text-align: center;
      font-size: 12px;
      padding: 8px 16px;
      letter-spacing: 0.03em;
      z-index: 999;
    }
    .preview-banner span { color: #00E5CC; font-weight: 600; }

    /* ── Card ──────────────────────────────────────────────────── */
    .card-wrap {
      width: 100%;
      max-width: 320px;
      margin-top: 36px;
    }

    .card {
      background: #0055FF;
      border-radius: 36px;
      padding: 28px 28px 32px;
      box-shadow: 0 24px 60px rgba(0, 85, 255, 0.35);
      position: relative;
      z-index: 2;
    }

    /* Logo */
    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: #00E5CC;
      letter-spacing: -0.5px;
    }
    .logo-text span { color: #00E5CC; font-weight: 400; }

    /* Amount */
    .item-name {
      text-align: center;
      color: rgba(255,255,255,0.65);
      font-size: 14px;
      margin-bottom: 4px;
      font-weight: 400;
    }
    .amount {
      text-align: center;
      color: #ffffff;
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 28px;
    }

    /* Buttons */
    .btn-apple {
      width: 100%;
      background: #000000;
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 17px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: default;
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }
    .btn-apple svg { flex-shrink: 0; }

    .btn-split {
      width: 100%;
      background: #00E5CC;
      color: #0055FF;
      border: none;
      border-radius: 16px;
      padding: 16px 20px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: default;
    }

    /* Card details tab — sits below the blue card */
    .card-details-tab {
      background: #00E5CC;
      border-radius: 0 0 28px 28px;
      padding: 22px 28px 18px;
      margin-top: -12px;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: default;
      box-shadow: 0 16px 40px rgba(0, 229, 204, 0.25);
    }
    .card-details-tab .label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #0055FF;
      font-size: 15px;
      font-weight: 600;
    }

    /* Chevron icon */
    .chevron {
      width: 20px;
      height: 20px;
      stroke: #0055FF;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Credit card icon */
    .icon-card {
      width: 20px;
      height: 20px;
      stroke: #0055FF;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Disclaimer */
    .disclaimer {
      margin-top: 28px;
      text-align: center;
      font-size: 11px;
      color: #aab0c0;
      letter-spacing: 0.03em;
      max-width: 280px;
    }
    .disclaimer strong { color: #00E5CC; font-weight: 600; }
  </style>
</head>
<body>

  <div class="preview-banner">
    DESIGN PREVIEW — shows how the TaptPay customer payment page looks.
    <span>Not a real payment form.</span>
  </div>

  <div class="card-wrap">

    <!-- Blue payment card -->
    <div class="card">

      <!-- taptpay. logo -->
      <div class="logo">
        <span class="logo-text">tapt<span>pay.</span></span>
      </div>

      <!-- Item + Amount -->
      <p class="item-name">latte</p>
      <p class="amount">$8.99</p>

      <!-- Apple Pay -->
      <button class="btn-apple" disabled>
        <!-- Apple logo -->
        <svg width="20" height="24" viewBox="0 0 814 1000" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105.4-57.8-155.5-127.4C46 790.8 0 663.4 0 541.8c0-207.8 133.4-317.5 264.4-317.5 99.1 0 181.5 65.5 243.5 65.5 59.3 0 152-69.3 263.4-69.3zM643.4 159.5c-28.4 33.8-74.2 60.3-115.8 60.3-5.2 0-10.4-.5-15.5-1.5 -.9-5.5-1.4-11-1.4-16.5 0-49.5 25.5-101.3 62.6-134.4 19.4-16.9 49.7-33.5 75.6-43.9 4.8 8.1 6.8 17.3 6.8 26.3 0 47.8-20.2 99.1-42.3 109.7z"/>
        </svg>
        Pay
      </button>

      <!-- Split the bill -->
      <button class="btn-split" disabled>
        <span>split the bill</span>
        <svg class="chevron" viewBox="0 0 24 24">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

    </div>

    <!-- Enter card details tab -->
    <div class="card-details-tab">
      <div class="label">
        <!-- Credit card icon -->
        <svg class="icon-card" viewBox="0 0 24 24">
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
          <line x1="1" y1="10" x2="23" y2="10"/>
        </svg>
        enter card details
      </div>
      <svg class="chevron" viewBox="0 0 24 24">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>

  </div>

  <p class="disclaimer">
    This is a <strong>design preview</strong> of the TaptPay customer payment screen.<br/>
    The actual page is live at <strong>/pay/:merchantId</strong>
  </p>

</body>
</html>
